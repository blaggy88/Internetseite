# EDEKA Niemerszein Nginx Configuration
# Einfache Konfiguration für deinen Server

server {
    # HTTP auf Port 80
    listen 80;
    listen [::]:80;
    
    # Deine Domain oder IP
    server_name _;  # Ersetze mit deiner Domain oder lasse _ für alle
    
    # Website-Verzeichnis
    root /var/www/edeka-niemerszein;
    
    # Standard-Datei
    index index.html;
    
    # Logs
    access_log /var/log/nginx/edeka_access.log;
    error_log /var/log/nginx/edeka_error.log;
    
    # GZIP Kompression für bessere Performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss application/json;
    
    # Sicherheits-Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Caching für statische Dateien
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    
    # HTML Dateien
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Hauptverzeichnis - zeigt index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # API Endpoint für KI-Assistent (optional)
    location /api/ {
        # Für zukünftige Backend-Integration
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Falls kein Backend läuft, 404 zurückgeben
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }
    
    # Fehlerseiten
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        internal;
    }
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    # Verstecke .htaccess und andere sensible Dateien
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Verstecke Log-Dateien
    location ~* \.(log|sql|bak|old)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

